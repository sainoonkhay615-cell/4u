<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sorry Babe</title>

<style>
body{
    margin:0;
    background:linear-gradient(to bottom,#ffb6c1,#ffc0cb);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    z-index:10;
}

.message{
    font-size:24px;
    color:#ff4081;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.sad{
    position:absolute;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="box">
    <h1>🥺 Sorry 🥺</h1>

    <div class="message">
        "သား" ရေ စိတ်ဆိုးနေတာလား 🥺<br><br>

        ကို မအားလို့ပါကွာ 😔<br>
        သားကို လျစ်လျူမရှုထားတာ မဟုတ်ဘူးနော် 💖<br><br>

        စိတ်ဆိုးပြေနော် 🥹<br>
        ကို့ကို ပြန်စကားပြောပေးပါ ❤️
    </div>
</div>

<script>
for(let i=0;i<50;i++){
    let sad=document.createElement("div");
    sad.innerHTML="😢";
    sad.classList.add("sad");

    sad.style.left=Math.random()*100+"vw";
    sad.style.animationDuration=(3+Math.random()*5)+"s";

    document.body.appendChild(sad);
}
</script>

</body>
</html>v
